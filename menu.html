<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>추천 메뉴</title>
  <style>
    body{
      margin:0;
      font-family: system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
      background: linear-gradient(180deg, rgba(42,193,188,.16), rgba(42,193,188,.05), #F7F8FA);
      color:#111827;
      display:flex;
      justify-content:center;
    }

    .app{
      width:min(390px, 100%);
      min-height:100vh;
      padding:20px 16px 100px;
    }

    .top{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:20px;
    }

    .backBtn{
      width:38px;
      height:38px;
      border:none;
      border-radius:12px;
      background:#fff;
      box-shadow:0 8px 18px rgba(0,0,0,.08);
      cursor:pointer;
      font-size:18px;
    }

    .title{
      font-size:20px;
      font-weight:900;
      letter-spacing:-0.03em;
    }

    .hero{
      background:#fff;
      border-radius:20px;
      box-shadow:0 12px 24px rgba(0,0,0,.08);
      padding:28px 20px;
      text-align:center;
      margin-bottom:16px;
    }

    .emoji{
      font-size:72px;
      line-height:1;
      margin-bottom:12px;
    }

    .sub{
      font-size:13px;
      color:#6B7280;
      font-weight:800;
      margin-bottom:6px;
    }

    .menuName{
      font-size:28px;
      font-weight:900;
      letter-spacing:-0.03em;
      margin-bottom:10px;
    }

    .desc{
      font-size:14px;
      color:#374151;
      line-height:1.5;
      font-weight:700;
    }

    .card{
      background:#fff;
      border-radius:18px;
      box-shadow:0 10px 18px rgba(0,0,0,.06);
      padding:16px;
      margin-bottom:12px;
    }

    .cardTitle{
      font-size:15px;
      font-weight:900;
      margin-bottom:12px;
    }

    .shop{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:12px 0;
      border-top:1px solid rgba(0,0,0,.06);
    }

    .shop:first-child{
      border-top:none;
      padding-top:0;
    }

    .left .name{
      font-weight:900;
      font-size:14px;
      margin-bottom:4px;
    }

    .left .meta{
      font-size:12px;
      color:#6B7280;
      font-weight:700;
    }

    .right{
      font-size:13px;
      font-weight:900;
      color:#111827;
    }

    .cta{
      margin-top:20px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .btn{
      border:none;
      border-radius:14px;
      padding:14px 12px;
      font-size:14px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 10px 18px rgba(0,0,0,.06);
    }

    .btn.primary{
      background:#2AC1BC;
      color:#fff;
    }

    .btn.secondary{
      background:#fff;
      color:#111827;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <button class="backBtn" onclick="location.href='index.html'">‹</button>
      <div class="title">추천 메뉴</div>
    </div>

    <div class="hero">
      <div class="emoji" id="menuEmoji">🍗</div>
      <div class="sub">오늘의 추천 메뉴</div>
      <div class="menuName" id="menuName">치킨</div>
      <div class="desc">
        룰렛 결과를 바탕으로 추천된 메뉴예요.<br>
        이 메뉴와 관련된 가게를 탐색해볼 수 있어요.
      </div>
    </div>

    <div class="card">
      <div class="cardTitle">추천 가게</div>

      <div class="shop">
        <div class="left">
          <div class="name" id="shop1">오늘의 치킨집</div>
          <div class="meta">⭐ 4.8 · 배달 25~35분</div>
        </div>
        <div class="right">18,000원~</div>
      </div>

      <div class="shop">
        <div class="left">
          <div class="name" id="shop2">바사삭 치킨</div>
          <div class="meta">⭐ 4.7 · 배달 30~40분</div>
        </div>
        <div class="right">17,500원~</div>
      </div>

      <div class="shop">
        <div class="left">
          <div class="name" id="shop3">한입에 반한 치킨</div>
          <div class="meta">⭐ 4.9 · 배달 20~30분</div>
        </div>
        <div class="right">19,000원~</div>
      </div>
    </div>

    <div class="cta">
      <button class="btn secondary" onclick="location.href='index.html'">다시 룰렛 돌리기</button>
      <button class="btn primary" onclick="location.href='https://wlgydl12-alt.github.io/yoojihyen/'">가게 보러가기</button>
    </div>
  </div>

  <script>
    const selectedName = localStorage.getItem("selectedMenuName") || "치킨";
    const selectedEmoji = localStorage.getItem("selectedMenuEmoji") || "🍗";

    document.getElementById("menuName").textContent = selectedName;
    document.getElementById("menuEmoji").textContent = selectedEmoji;

    // 가게 이름도 메뉴에 맞춰 바꿔주기
    document.getElementById("shop1").textContent = `오늘의 ${selectedName} 맛집`;
    document.getElementById("shop2").textContent = `${selectedName} 한상`;
    document.getElementById("shop3").textContent = `${selectedName} 추천가게`;
  </script>
</body>
</html>
